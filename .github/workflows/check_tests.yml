name: format, build and test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-solutions-ubuntu:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: fetch dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y lsb-release wget software-properties-common gnupg libgtest-dev

        sudo add-apt-repository ppa:ubuntu-toolchain-r/test -y
        sudo apt-get update
        sudo apt-get install -y g++-13 gcc-13 libgtest-dev
        
        wget https://apt.llvm.org/llvm.sh
        chmod +x llvm.sh
        sudo ./llvm.sh 17
        
        sudo apt-get install -y clang-format-17 clang-tidy-17
        
        sudo ln -sf /usr/bin/clang-format-17 /usr/bin/clang-format
        sudo ln -sf /usr/bin/clang-tidy-17 /usr/bin/clang-tidy
    - name: cmake
      run: |
        mkdir build
        cd build
        cmake -DCMAKE_BUILD_TYPE=Release -DCMAKE_CXX_COMPILER=g++-13 ..
    - name: make
      run: |
        cd build
        make
    - name: clang format and tidy
      run: |
        ./scripts/format.sh
    - name: test
      run: |
        cd build
        ctest --output-on-failure --output-junit test_results.xml